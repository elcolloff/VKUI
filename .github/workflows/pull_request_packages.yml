name: Pull Request / Packages
concurrency:
  group: pr-packages-${{ github.event.pull_request.number }}
  cancel-in-progress: true
jobs:
  changed_files:
    runs-on: ubuntu-latest
    name: Detect what files changed
    outputs:
      package_vkui: ${{ steps.changes.outputs.package_vkui }}
      docs_storybook: ${{ steps.changes.outputs.docs_storybook }}
      docs_website: ${{ steps.changes.outputs.docs_website }}
      dependencies: ${{ steps.changes.outputs.dependencies }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Mock Find changes
      id: changes
      run: |-
        echo "package_vkui=true" >> "$GITHUB_OUTPUT"
        echo "docs_storybook=true" >> "$GITHUB_OUTPUT"
        echo "docs_website=true" >> "$GITHUB_OUTPUT"
        echo "dependencies=true" >> "$GITHUB_OUTPUT"
  test:
    name: Call reusable workflow
    uses: ./.github/workflows/reusable_workflow_test.yml
    secrets: inherit
  test_e2e:
    if: ${{ needs.changed_files.outputs.package_vkui == 'true' }}
    needs: changed_files
    name: Call reusable workflow
    uses: ./.github/workflows/reusable_workflow_test_e2e.yml
    secrets: inherit
  test_e2e_prepare_and_upload_report:
    if: ${{ !cancelled() && (success() || failure()) }}
    needs: test_e2e
    name: Prepare and upload e2e's HTML report artifact
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Node setup
      uses: ./.github/actions/node-setup
    - name: Mock Download Playwright blob reports
      run: mkdir -p packages/vkui/artifacts
    - name: Mock Prepare downloaded Playwright blob reports
      run: mkdir -p all-blob-reports
    - name: Mock Merge Playwright blob reports
      run: mkdir -p playwright-report
    - name: Upload Playwright HTML report to GitHub Actions Artifacts
      uses: actions/upload-artifact@v7
      with:
        name: playwright-report
        path: playwright-report
        retention-days: 30
  diff_build:
    if: ${{ needs.changed_files.outputs.package_vkui == 'true' }}
    needs: changed_files
    runs-on: ubuntu-latest
    name: Generate Diff
    steps:
    - name: Checkout PR branch
      uses: actions/checkout@v6
    - name: Node setup (pr)
      uses: ./.github/actions/node-setup
    - name: Mock Build vkui PR
      run: mkdir -p packages/vkui/pr_dist
    - name: Mock Checkout target
      run: echo "Mocking checkout"
    - name: Mock Node setup (target)
      run: echo "Mocking node setup"
    - name: Mock Rename dist folder
      run: echo "Mocking rename"
    - name: Mock Build vkui (target)
      run: mkdir -p packages/vkui/dist
    - name: Mock Generate diff
      id: generate-diff
      run: echo "has_diff=true" >> "$GITHUB_OUTPUT"
    - name: Generate HTML report
      if: steps.generate-diff.outputs.has_diff == 'true'
      run: |
        mkdir diff
        yarn run diff2html -i file -F diff/diff-report.html --summary open  --title "VKUI Bundle Diff" --style side -- code_diff.dif
    - name: Upload report
      if: steps.generate-diff.outputs.has_diff == 'true'
      uses: actions/upload-artifact@v7
      with:
        name: diff-report
        path: diff/
  docs_storybook_upload:
    if: ${{ needs.changed_files.outputs.docs_storybook == 'true' }}
    needs: changed_files
    runs-on: ubuntu-latest
    name: Upload docs dist artifact (storybook)
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Node setup
      uses: ./.github/actions/node-setup
    - name: Mock Build
      run: mkdir -p packages/vkui/storybook-static
    - name: Upload dist
      uses: actions/upload-artifact@v7
      with:
        name: storybook-dist
        path: packages/vkui/storybook-static
  docs_website_upload:
    if: ${{ needs.changed_files.outputs.docs_website == 'true' }}
    needs: changed_files
    runs-on: ubuntu-latest
    name: Upload docs dist artifact
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Node setup
      uses: ./.github/actions/node-setup
    - name: Mock Build VKUI
      run: echo "Mocking build"
    - name: Mock Build
      run: mkdir -p website/out
    - name: Upload dist
      uses: actions/upload-artifact@v7
      with:
        name: docs-website-dist
        path: website/out
  upload_pr_workflow_payload:
    needs:
    - test
    - test_e2e_prepare_and_upload_report
    - docs_storybook_upload
    if: ${{ !cancelled() }}
    name: Call reusable workflow
    uses: ./.github/workflows/reusable_workflow_pr_worfklow_payload.yml
    with:
      action: upload
    runs-on: ubuntu-latest
    secrets: inherit
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  pull_request:
    types:
    - opened
    - synchronize
    - reopened
    - ready_for_review
    paths-ignore:
    - .husky/**
    - .github/**
    - '!.github/actions/**'
    - .github/actions/**/*.yml
    - '**/*.md'
    - '**/__image_snapshots__/*.png'
